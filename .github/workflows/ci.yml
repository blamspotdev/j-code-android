name: CI

on:
  push:
  pull_request:

jobs:
  android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', 'gradle/libs.versions.toml') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('native/**/Cargo.lock', 'native/**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Cache Android SDK / NDK / Konan
        uses: actions/cache@v4
        with:
          path: |
            ~/.android
            ~/android-sdk
            ~/.konan
          key: ${{ runner.os }}-android-sdk-ndk-r27c

      - name: Enable KVM permissions
        run: |
          sudo chown $USER /dev/kvm || true

      - name: Create detekt placeholder if missing
        run: ./gradlew tasks --all

      - name: Build and verify
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          profile: pixel_6
          script: ./gradlew assembleDebug lintDebug testDebugUnitTest detekt connectedDebugAndroidTest
