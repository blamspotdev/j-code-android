entries:
  - id: clangd
    category: languages
    name: C/C++
    description: Installs clang, clangd, lldb, and gdb for C-family projects.
    installScript: |
      sudo apt-get update
      sudo apt-get install -y clang clangd lldb gdb
    verifyScript: |
      command -v clang >/dev/null 2>&1 && command -v clangd >/dev/null 2>&1 && echo ready
    uninstallScript: |
      sudo apt-get remove -y clang clangd lldb gdb
    updateCheckScript: "apt list --upgradable 2>/dev/null | grep -qE '^(clang|clangd|lldb|gdb)/'"

  - id: python
    category: languages
    name: Python
    description: Installs Python 3, venv support, and pip for app and script projects.
    installScript: |
      sudo apt-get update
      sudo apt-get install -y python3 python3-venv python3-pip
    verifyScript: |
      command -v python3 >/dev/null 2>&1 && python3 -m venv /tmp/_jcodevenv >/dev/null 2>&1 && rm -rf /tmp/_jcodevenv && echo ready
    uninstallScript: |
      sudo apt-get remove -y python3 python3-venv python3-pip
    updateCheckScript: "apt list --upgradable 2>/dev/null | grep -qE '^(python3|python3-venv|python3-pip)/'"

  - id: nodejs
    category: languages
    name: Node.js and npm
    description: Installs the newest LTS Node.js and npm (resolved at install time) for TypeScript, JavaScript, and frontend tooling.
    # Ubuntu's apt "npm" (Debian-patched) fails under proot with a phantom
    # `mkdir '/home' ENOENT` inside Arborist, breaking all `npm install`/`npm create`.
    # Ship upstream Node (unpatched npm) into /usr/local so it shadows any distro node on PATH.
    installScript: |
      set -e
      command -v curl >/dev/null 2>&1 || sudo apt-get install -y curl ca-certificates
      # Newest LTS line from the release index (column 10 = LTS codename, "-" = not LTS).
      NODE_VERSION=$(curl -fsSL https://nodejs.org/dist/index.tab | awk -F'\t' 'NR>1 && $10!="-" {print $1; exit}')
      [ -n "$NODE_VERSION" ]
      case "$(uname -m)" in
        aarch64|arm64) NODE_ARCH=arm64 ;;
        x86_64|amd64)  NODE_ARCH=x64 ;;
        *) echo "Unsupported architecture: $(uname -m)"; exit 1 ;;
      esac
      TARBALL="node-${NODE_VERSION}-linux-${NODE_ARCH}.tar.gz"
      curl -fsSL -o "/tmp/${TARBALL}" "https://nodejs.org/dist/${NODE_VERSION}/${TARBALL}"
      sudo tar -xzf "/tmp/${TARBALL}" -C /usr/local --strip-components=1
      rm -f "/tmp/${TARBALL}"
      node --version && npm --version
    verifyScript: |
      command -v node >/dev/null 2>&1 && command -v npm >/dev/null 2>&1 && echo ready
    uninstallScript: |
      sudo rm -f /usr/local/bin/node /usr/local/bin/npm /usr/local/bin/npx /usr/local/bin/corepack
      sudo rm -rf /usr/local/lib/node_modules/npm /usr/local/lib/node_modules/corepack
    updateCheckScript: |
      L=$(curl -fsSL https://nodejs.org/dist/index.tab | awk -F'\t' 'NR>1 && $10!="-" {print $1; exit}')
      [ -n "$L" ] && [ "$(node --version 2>/dev/null)" != "$L" ]

  - id: jdk
    category: languages
    name: Java (JDK)
    description: OpenJDK 21 plus ktlint — the JVM runtime and formatter that Kotlin/Java language servers and the Kotlin formatter need.
    installScript: |
      set -e
      sudo apt-get update
      sudo apt-get install -y openjdk-21-jdk-headless curl ca-certificates
      curl -fsSL -o /tmp/ktlint https://github.com/pinterest/ktlint/releases/latest/download/ktlint
      sudo install -m 0755 /tmp/ktlint /usr/local/bin/ktlint
      rm -f /tmp/ktlint
    verifyScript: |
      command -v java >/dev/null 2>&1 && command -v ktlint >/dev/null 2>&1 && echo ready
    uninstallScript: |
      sudo apt-get remove -y openjdk-21-jdk-headless
      sudo rm -f /usr/local/bin/ktlint
    updateCheckScript: ""

  - id: rust
    category: build-tools
    name: Rust toolchain
    description: Installs rustup, rustc, and cargo into the jcode user's home directory.
    installScript: |
      sudo apt-get update
      sudo apt-get install -y curl ca-certificates build-essential
      curl --proto '=https' --tlsv1.2 -fsSL https://sh.rustup.rs | bash -s -- -y
    verifyScript: |
      [ -x "$HOME/.cargo/bin/rustc" ] && [ -x "$HOME/.cargo/bin/cargo" ] && echo ready
    uninstallScript: |
      rm -rf "$HOME/.cargo" "$HOME/.rustup"

  - id: cmake-ninja
    category: build-tools
    name: CMake and Ninja
    description: Installs the baseline native build tools used by J Code and Android/NDK projects.
    installScript: |
      sudo apt-get update
      sudo apt-get install -y cmake ninja-build pkg-config
    verifyScript: |
      command -v cmake >/dev/null 2>&1 && command -v ninja >/dev/null 2>&1 && echo ready
    uninstallScript: |
      sudo apt-get remove -y cmake ninja-build pkg-config
    updateCheckScript: "apt list --upgradable 2>/dev/null | grep -qE '^(cmake|ninja-build|pkg-config)/'"

  - id: android-prereqs
    category: android
    name: Android SDK prerequisites
    description: JDK 21 plus the distro's native aarch64 Android build tools (aapt2/aapt/zipalign/apksigner) — the ARM-native pieces Google's x86_64-only build-tools can't provide on this device.
    supportedArches: [arm64]
    installScript: |
      sudo apt-get update
      sudo apt-get install -y openjdk-21-jdk-headless unzip wget zip file procps aapt android-sdk-build-tools
    verifyScript: |
      command -v javac >/dev/null 2>&1 && /usr/lib/android-sdk/build-tools/debian/aapt2 version >/dev/null 2>&1 && echo ready
    uninstallScript: |
      sudo apt-get remove -y openjdk-21-jdk-headless aapt android-sdk-build-tools
    updateCheckScript: "apt list --upgradable 2>/dev/null | grep -qE '^(openjdk-21-jdk-headless|aapt|android-sdk-build-tools)/'"

  - id: android-sdk
    category: android
    name: Android SDK
    description: Command-line tools, the newest stable Android platform and build-tools, and the latest Gradle — all resolved at install time and wired with the ARM-native aapt2 so on-device Gradle builds (assembleDebug) produce a real APK. Gradle is exposed at /opt/gradle/current and on PATH. Requires the Android SDK prerequisites. Large download.
    supportedArches: [arm64]
    requiredSdks: [android-prereqs]
    installScript: |
      set -e
      export ANDROID_HOME="$HOME/android-sdk"
      export JAVA_HOME="$(dirname "$(dirname "$(readlink -f "$(command -v javac)")")")"
      mkdir -p "$ANDROID_HOME"
      # One manifest fetch drives every version choice below (`sdkmanager --list` re-downloads the
      # same manifest through a JVM and takes tens of minutes under proot).
      wget -qO /tmp/android-repo.xml https://dl.google.com/android/repository/repository2-3.xml
      if [ ! -x "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" ]; then
        CLT_ZIP=$(grep -oE 'commandlinetools-linux-[0-9]+_latest\.zip' /tmp/android-repo.xml | sort -u -V | tail -1)
        [ -n "$CLT_ZIP" ]
        wget -q -O /tmp/clt.zip "https://dl.google.com/android/repository/$CLT_ZIP"
        rm -rf /tmp/cmdline-tools && (cd /tmp && unzip -q clt.zip)
        mkdir -p "$ANDROID_HOME/cmdline-tools/latest"
        mv /tmp/cmdline-tools/* "$ANDROID_HOME/cmdline-tools/latest/"
        rm -rf /tmp/cmdline-tools /tmp/clt.zip
      fi
      # Newest stable platform and build-tools named in the manifest (previews use codename
      # platform paths and -rcN build-tools suffixes, so both are filtered out).
      PLATFORM=$(grep -oE 'platforms;android-[0-9]+(\.[0-9]+)?' /tmp/android-repo.xml | sort -u -V | tail -1)
      BUILD_TOOLS=$(grep -oE 'build-tools;[0-9]+\.[0-9]+\.[0-9]+(-rc[0-9]+)?' /tmp/android-repo.xml | grep -v -- '-rc' | sort -u -V | tail -1)
      rm -f /tmp/android-repo.xml
      [ -n "$PLATFORM" ] && [ -n "$BUILD_TOOLS" ]
      PLAT_DIR="${PLATFORM#platforms;}"
      BT_VER="${BUILD_TOOLS#build-tools;}"
      SDKM="$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager"
      # Accept licenses. Both pipeline members need their own timeout: sdkmanager hangs after
      # writing the licenses, and under proot `yes` never gets SIGPIPE when its consumer dies,
      # which otherwise deadlocks the whole script on the pipeline.
      timeout 130 yes | timeout 120 "$SDKM" --sdk_root="$ANDROID_HOME" --licenses >/dev/null 2>&1 || true
      # sdkmanager downloads only when fed 'yes' on stdin, but then HANGS after finishing. Run it in
      # the background, wait for the platform + build-tools to land, then stop it — bailing out
      # early if it dies instead of hanging.
      ( timeout 1900 yes | "$SDKM" --sdk_root="$ANDROID_HOME" "$PLATFORM" "$BUILD_TOOLS" "platform-tools" >/tmp/android-sdk-install.log 2>&1 ) &
      SDK_PID=$!
      for i in $(seq 1 180); do
        [ -f "$ANDROID_HOME/platforms/$PLAT_DIR/android.jar" ] && [ -x "$ANDROID_HOME/build-tools/$BT_VER/aapt2" ] && break
        kill -0 "$SDK_PID" 2>/dev/null || break
        sleep 10
      done
      pkill -f sdkmanager 2>/dev/null || true
      if [ ! -f "$ANDROID_HOME/platforms/$PLAT_DIR/android.jar" ] || [ ! -x "$ANDROID_HOME/build-tools/$BT_VER/aapt2" ]; then
        echo "sdkmanager failed to install $PLATFORM / $BUILD_TOOLS:"
        tail -n 20 /tmp/android-sdk-install.log 2>/dev/null || true
        exit 1
      fi
      # Replace the x86_64 aapt2/aapt/zipalign with the distro's native aarch64 builds.
      DEB=/usr/lib/android-sdk/build-tools/debian
      for b in aapt2 aapt zipalign; do
        if [ -e "$DEB/$b" ]; then cp -f "$DEB/$b" "$ANDROID_HOME/build-tools/$BT_VER/$b"; fi
      done
      GRADLE_VERSION=$(wget -qO- https://services.gradle.org/versions/current | sed -n 's/.*"version" *: *"\([^"]*\)".*/\1/p')
      [ -n "$GRADLE_VERSION" ]
      if [ ! -x "/opt/gradle/gradle-$GRADLE_VERSION/bin/gradle" ]; then
        wget -q -O /tmp/gradle.zip "https://services.gradle.org/distributions/gradle-$GRADLE_VERSION-bin.zip"
        sudo mkdir -p /opt/gradle && (cd /opt/gradle && sudo unzip -q /tmp/gradle.zip) && rm -f /tmp/gradle.zip
      fi
      # Stable paths so run recipes and projects never hardcode a Gradle version.
      sudo ln -sfn "/opt/gradle/gradle-$GRADLE_VERSION" /opt/gradle/current
      sudo ln -sf /opt/gradle/current/bin/gradle /usr/local/bin/gradle
    verifyScript: |
      ls "$HOME"/android-sdk/platforms/*/android.jar >/dev/null 2>&1 && [ -x /opt/gradle/current/bin/gradle ] && BT=$(ls -d "$HOME"/android-sdk/build-tools/*/ 2>/dev/null | sort -V | tail -1) && "${BT}aapt2" version >/dev/null 2>&1 && echo ready
    uninstallScript: |
      rm -rf "$HOME/android-sdk"
      sudo rm -rf /opt/gradle
      sudo rm -f /usr/local/bin/gradle
    updateCheckScript: |
      [ -d "$HOME/android-sdk/platforms" ] || exit 1
      A=$(wget -qO- https://dl.google.com/android/repository/repository2-3.xml | grep -oE 'platforms;android-[0-9]+(\.[0-9]+)?' | sort -u -V | tail -1)
      [ -n "$A" ] && [ ! -f "$HOME/android-sdk/platforms/${A#platforms;}/android.jar" ]

  - id: dotnet
    category: dotnet
    name: .NET SDK
    description: Installs the currently-supported .NET SDKs (LTS + STS channels, resolved at install time — .NET 10 + 9 today) into $HOME/.dotnet, plus a pinned .NET 8 runtime floor that netcoredbg needs. A new .NET release needs no JCode update.
    installScript: |
      sudo apt-get update
      sudo apt-get install -y curl ca-certificates
      mkdir -p "$HOME/.dotnet"
      curl -fsSL https://dot.net/v1/dotnet-install.sh -o /tmp/dotnet-install.sh
      # Currently-supported SDK lines, resolved dynamically so a new .NET release needs no change here.
      # LTS installs first so the newest host owns the unversioned `dotnet` muxer; every later (older)
      # install gets --skip-non-versioned-files so it can't overwrite that newer host.
      bash /tmp/dotnet-install.sh --channel LTS --install-dir "$HOME/.dotnet"
      bash /tmp/dotnet-install.sh --channel STS --install-dir "$HOME/.dotnet" --skip-non-versioned-files
      # Pinned .NET 8 runtime floor (runtime-only): netcoredbg is built against .NET 8 and needs
      # the 8.x shared runtime even once .NET 8's SDK is EOL.
      bash /tmp/dotnet-install.sh --channel 8.0 --runtime dotnet --install-dir "$HOME/.dotnet" --skip-non-versioned-files
      # CoreCLR over-reserves for the whole device RAM inside proot's ptrace-constrained address
      # space and gets killed on first start; every dotnet call needs the 1 GB GC cap. The shim
      # also puts dotnet + installed global tools on PATH for non-login shells.
      printf '#!/bin/sh\nexport DOTNET_GCHeapHardLimit=0x40000000\nexport DOTNET_CLI_TELEMETRY_OPTOUT=1\nexport DOTNET_ROOT="%s/.dotnet"\ncase "$TMPDIR" in /data/*) export TMPDIR=/tmp ;; esac\nexport PATH="$PATH:%s/.dotnet/tools"\nexec "%s/.dotnet/dotnet" "$@"\n' "$HOME" "$HOME" "$HOME" | sudo tee /usr/local/bin/dotnet >/dev/null
      sudo chmod 755 /usr/local/bin/dotnet
      printf 'export DOTNET_GCHeapHardLimit=0x40000000\nexport DOTNET_CLI_TELEMETRY_OPTOUT=1\nexport DOTNET_ROOT="%s/.dotnet"\nexport PATH="$PATH:%s/.dotnet/tools"\n' "$HOME" "$HOME" | sudo tee /etc/profile.d/jcode-dotnet.sh >/dev/null
    verifyScript: |
      [ -x "$HOME/.dotnet/dotnet" ] && /usr/local/bin/dotnet --list-sdks 2>/dev/null | grep -q . && echo ready
    uninstallScript: |
      rm -rf "$HOME/.dotnet"
      sudo rm -f /usr/local/bin/dotnet /etc/profile.d/jcode-dotnet.sh

  - id: arm-none-eabi
    category: embedded
    name: ARM embedded GCC
    description: Installs an embedded ARM cross-compiler, GDB multiarch, and OpenOCD.
    installScript: |
      sudo apt-get update
      sudo apt-get install -y gcc-arm-none-eabi gdb-multiarch openocd
    verifyScript: |
      command -v arm-none-eabi-gcc >/dev/null 2>&1 && command -v openocd >/dev/null 2>&1 && echo ready
    uninstallScript: |
      sudo apt-get remove -y gcc-arm-none-eabi gdb-multiarch openocd
    updateCheckScript: "apt list --upgradable 2>/dev/null | grep -qE '^(gcc-arm-none-eabi|gdb-multiarch|openocd)/'"

  - id: postgresql
    category: databases
    name: PostgreSQL
    description: Full-featured SQL database server. Runs as the jcode user via pg_ctl, no systemd needed.
    installScript: |
      sudo apt-get update
      sudo apt-get install -y postgresql postgresql-contrib
      sudo -u postgres pg_ctlcluster "$(ls /etc/postgresql | sort -V | tail -1)" main start
      sudo -u postgres createuser --superuser jcode
      createdb jcode
    verifyScript: |
      pg_isready -U jcode -d jcode >/dev/null 2>&1 && echo ready
    uninstallScript: |
      for v in $(ls /etc/postgresql 2>/dev/null); do sudo -u postgres pg_ctlcluster "$v" main stop 2>/dev/null || true; done
      sudo apt-get remove -y postgresql postgresql-contrib
      sudo rm -rf /var/lib/postgresql
    updateCheckScript: "apt list --upgradable 2>/dev/null | grep -qE '^(postgresql|postgresql-contrib)/'"

  - id: mariadb
    category: databases
    name: MariaDB
    description: MySQL-compatible relational database. Lightweight and ARM64-native.
    installScript: |
      sudo apt-get update
      sudo apt-get install -y mariadb-server mariadb-client
      sudo service mariadb start
      mysql -u root -e "CREATE USER IF NOT EXISTS 'jcode'@'localhost'; GRANT ALL PRIVILEGES ON *.* TO 'jcode'@'localhost' WITH GRANT OPTION; FLUSH PRIVILEGES;"
    verifyScript: |
      mysql -u jcode -e "SELECT 1" >/dev/null 2>&1 && echo ready
    uninstallScript: |
      sudo service mariadb stop 2>/dev/null || true
      sudo apt-get remove -y mariadb-server mariadb-client
      sudo rm -rf /var/lib/mysql
    updateCheckScript: "apt list --upgradable 2>/dev/null | grep -qE '^(mariadb-server|mariadb-client)/'"

  - id: redis
    category: databases
    name: Redis
    description: In-memory key-value store for caching and real-time data.
    installScript: |
      sudo apt-get update
      sudo apt-get install -y redis-server
      redis-server --daemonize yes
    verifyScript: |
      redis-cli ping 2>/dev/null | grep -q PONG && echo ready
    uninstallScript: |
      redis-cli shutdown 2>/dev/null || true
      sudo apt-get remove -y redis-server
    updateCheckScript: "apt list --upgradable 2>/dev/null | grep -qE '^(redis-server)/'"

  - id: git
    category: build-tools
    name: Git
    description: Distributed version control system. Essential for any project workflow.
    installScript: |
      sudo apt-get update
      sudo apt-get install -y git
    verifyScript: |
      command -v git >/dev/null 2>&1 && echo ready
    uninstallScript: |
      sudo apt-get remove -y git
    updateCheckScript: "apt list --upgradable 2>/dev/null | grep -qE '^git/'"

  - id: docker-cli
    category: build-tools
    name: Docker CLI
    description: Docker command-line client for building and managing containers (requires host Docker daemon).
    installScript: |
      sudo apt-get update
      sudo apt-get install -y docker.io
      sudo usermod -aG docker jcode
    verifyScript: |
      command -v docker >/dev/null 2>&1 && echo ready
    uninstallScript: |
      sudo apt-get remove -y docker.io
    updateCheckScript: "apt list --upgradable 2>/dev/null | grep -qE '^docker.io/'"

  - id: qemu-system-x86
    category: virtualization
    name: QEMU (x86)
    description: Full-system QEMU to run x86/x86_64 virtual machines on this ARM device, for software with no ARM build (e.g. Microsoft SQL Server). Pure software emulation (no KVM on device) — VMs are slow but fully compatible. Drives the VM Manager extension.
    supportedArches: [arm64]
    installScript: |
      sudo apt-get update
      sudo apt-get install -y qemu-system-x86 qemu-utils
    verifyScript: |
      command -v qemu-system-x86_64 >/dev/null 2>&1 && command -v qemu-img >/dev/null 2>&1 && echo ready
    uninstallScript: |
      sudo apt-get remove -y qemu-system-x86 qemu-utils
    updateCheckScript: "apt list --upgradable 2>/dev/null | grep -qE '^(qemu-system-x86|qemu-utils)/'"
  - id: opencode
    category: ai
    name: opencode
    description: >-
      The opencode AI coding agent (single self-contained binary, no Node.js needed). Powers the
      Chat tab in the right drawer via the OpenChamber extension, and briefs the agent on JCode's
      environment. Bring an API key or subscription for your model provider.
    supportedArches: [arm64]
    installScript: |
      set -e
      sudo apt-get update -qq
      sudo apt-get install -y -qq curl ca-certificates git
      if ! [ -x "$HOME/.opencode/bin/opencode" ]; then curl -fsSL https://opencode.ai/install | bash; fi
      sudo ln -sf "$HOME/.opencode/bin/opencode" /usr/local/bin/opencode || true
      mkdir -p "$HOME/.config/opencode"
      cat > "$HOME/.config/opencode/AGENTS.md" <<'JCODE_EOF'
      # You are running inside JCode
      You are an AI coding agent inside JCode, a native Android IDE on an ARM64 handheld. Your shell
      runs in a proot Ubuntu 24.04 (aarch64) userland. Hard constraints:
      - Projects live under /workspace (a FUSE mount). It is noexec and has no symlink support: never
        execute compiled binaries from it and never create node_modules there. Use ext4 instead,
        e.g. $HOME/.jcode-run/<project>/.
      - HOME=/root, USER=root, TMPDIR=/tmp. No systemd, no GUI, no Docker, no x86 emulation.
      - .NET: export DOTNET_GCHeapHardLimit=0x40000000 before any dotnet command.
      - The IDE runs projects via .jcode/run.yaml (name, readyPort, terminals: label+command list);
        keep it working when you change how a project runs.
      - Dev servers should bind 127.0.0.1; the IDE opens the device browser against localhost.
      - The screen is small and builds are slow: keep output short, prefer incremental commands.
      JCODE_EOF
      echo "installed: opencode $(opencode --version 2>/dev/null | tail -1)"
    verifyScript: |
      export PATH="$PATH:$HOME/.opencode/bin"
      command -v opencode >/dev/null 2>&1 && echo ready
    uninstallScript: |
      rm -rf "$HOME/.opencode"
      sudo rm -f /usr/local/bin/opencode
    updateCheckScript: ""
  - id: claude
    category: ai
    name: Claude Code
    description: >-
      Anthropic's Claude Code CLI coding agent. Installed globally via npm (needs Node.js). Bring an
      API key or a Claude subscription, then run `claude` in the terminal.
    supportedArches: [arm64]
    requiredSdks: [nodejs]
    installScript: |
      set -e
      sudo npm install -g @anthropic-ai/claude-code
      echo "installed: claude $(claude --version 2>/dev/null | tail -1)"
    verifyScript: |
      command -v claude >/dev/null 2>&1 && echo ready
    uninstallScript: |
      sudo npm rm -g @anthropic-ai/claude-code
    updateCheckScript: ""
  - id: codex
    category: ai
    name: Codex
    description: >-
      OpenAI's Codex CLI coding agent. Installed globally via npm (needs Node.js). Bring an OpenAI API
      key, then run `codex` in the terminal.
    supportedArches: [arm64]
    requiredSdks: [nodejs]
    installScript: |
      set -e
      sudo npm install -g @openai/codex
      echo "installed: codex $(codex --version 2>/dev/null | tail -1)"
    verifyScript: |
      command -v codex >/dev/null 2>&1 && echo ready
    uninstallScript: |
      sudo npm rm -g @openai/codex
    updateCheckScript: ""
